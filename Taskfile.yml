version: "3"

dotenv: [".env"]

vars:
  KUBERNETES_VERSION: "v1.32.13"
  CILIUM_VERSION: "1.19.2"
  SEALED_SECRETS_VERSION: "2.18.4"
  ARGOCD_VERSION: "7.8.23"

includes:
  hetzner: ./infra/taskfiles/hetzner.yml
  cluster: ./infra/taskfiles/cluster.yml
  validate: ./infra/taskfiles/validate.yml

tasks:
  help:
    desc: "Show available tasks"
    silent: true
    cmds:
      - |
        echo ""
        echo "K8s Platform — Hetzner"
        echo "Usage: task <namespace>:<operation>"
        echo ""
        echo "Infrastructure (task hetzner:<op>):"
        echo "  packer              Build golden images (NAT + K8s node)"
        echo "  packer:nat          Build NAT gateway image only"
        echo "  packer:k8s          Build K8s node image only"
        echo "  plan                Plan infrastructure (dev)"
        echo "  plan:prod           Plan infrastructure (prod)"
        echo "  apply               Apply infrastructure (dev)"
        echo "  apply:prod          Apply infrastructure (prod)"
        echo "  destroy             Destroy infrastructure — prompts for confirmation (dev)"
        echo "  destroy:prod        Destroy infrastructure — prompts for confirmation (prod)"
        echo "  output              Show Terraform outputs (dev)"
        echo "  output:prod         Show Terraform outputs (prod)"
        echo "  kubeconfig          Fetch kubeconfig from CP node (dev)"
        echo "  kubeconfig:prod     Fetch kubeconfig from CP node (prod)"
        echo "  bootstrap           kubeconfig + post-bootstrap steps (dev)"
        echo "  bootstrap:prod      kubeconfig + post-bootstrap steps (prod)"
        echo ""
        echo "Cluster ops (task cluster:<op>):"
        echo "  set-email           Set Let's Encrypt email in ClusterIssuers"
        echo "  set-repo            Set Git repo URL in ArgoCD app manifests"
        echo "  fetch-cert          Fetch Sealed Secrets cert from CP node"
        echo "  seal                Seal a single secret"
        echo "  seal-all            Seal all platform bootstrap secrets"
        echo "  post-bootstrap      Full post-bootstrap: fetch-cert + seal-all"
        echo ""
        echo "Validation (task validate:<op>):"
        echo "  env                 Check .env vars, required files, installed tools"
        echo "  terraform           fmt + validate Terraform"
        echo "  packer              Validate Packer templates"
        echo "  kustomize           Render ArgoCD overlays"
        echo "  manifests           kubeconform on ArgoCD app manifests"
        echo ""
        echo "Run 'task validate:env' before first use to check your setup."
        echo ""

  validate:
    desc: "Run all static validation checks"
    cmds:
      - task: validate:env
      - task: validate:terraform
      - task: validate:packer
      - task: validate:kustomize
      - task: validate:manifests
