# =============================================================================
# RUSTFS TO GCS BACKUP — CronJob
# =============================================================================
# Copies object storage data from internal RustFS to Google Cloud Storage.
# Runs daily at 03:00 UTC (staggered from etcd backup at 02:00).
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rustfs-gcs-backup
  namespace: platform-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  schedule: "0 3 * * *" # 03:00 UTC daily (staggered from etcd backup at 02:00)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rclone-sync
              image: rclone/rclone:1.65
              env:
                - name: RUSTFS_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: rclone-config-secret
                      key: rustfs-bucket-name
                - name: GCS_BACKUP_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: rclone-config-secret
                      key: gcs-backup-bucket-name
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  echo "[rustfs-backup] Starting copy to GCS at $(date)"

                  # 'copy' is additive-only — never deletes from destination.
                  # GCS bucket versioning + lifecycle rules handle expiration.
                  rclone copy rustfs:${RUSTFS_BUCKET} gcs:${GCS_BACKUP_BUCKET} \
                    --config /etc/rclone/rclone.conf \
                    --progress \
                    --transfers 4 \
                    --checkers 8 \
                    --fast-list

                  echo "[rustfs-backup] Copy complete at $(date)"
              volumeMounts:
                - name: rclone-config
                  mountPath: /etc/rclone
                  readOnly: true
                - name: gcp-credentials
                  mountPath: /etc/gcp
                  readOnly: true
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: rclone-config
              secret:
                secretName: rclone-config-secret
            - name: gcp-credentials
              secret:
                secretName: gcp-service-account-secret
