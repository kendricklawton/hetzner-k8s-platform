apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opencost
  namespace: argocd
  labels:
    platform.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: "https://opencost.github.io/opencost-helm-chart"
    chart: opencost
    targetRevision: "2.5.12"
    helm:
      values: |
        opencost:
          prometheus:
            internal:
              enabled: true
              serviceName: vmsingle-victoria-metrics-victoria-metrics-k8s-stack
              namespaceName: observability
              port: 8428
          ui:
            enabled: true
          # Hetzner Cloud custom pricing
          customPricing:
            enabled: true
            configmapName: opencost-custom-pricing
            provider: custom
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
  destination:
    server: "https://kubernetes.default.svc"
    namespace: opencost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
