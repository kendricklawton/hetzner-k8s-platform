# CNPG METRICS — VMServiceScrape
# CloudNativePG exposes Prometheus metrics on :9187/metrics by default.
# This VMServiceScrape tells vmagent to discover and scrape CNPG pods.

---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: cnpg-cluster
  namespace: observability
  labels:
    platform.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  namespaceSelector:
    matchNames:
      - platform-system
      - cnpg-system
  selector:
    matchLabels:
      cnpg.io/podRole: instance
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
