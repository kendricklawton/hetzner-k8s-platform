apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs
  namespace: argocd
  labels:
    platform.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    # Uses the official RustFS helm repository
    repoURL: "https://rustfs.github.io/helm"
    chart: rustfs
    targetRevision: "0.0.90"
    helm:
      values: |
        replicaCount: 1 # Single node mode for now, scale up as needed
        persistence:
          enabled: true
          size: 50Gi
        # Root credentials sourced from a SealedSecret.
        # Create with: task cluster:seal TENANT=platform-system NAME=rustfs-credentials \
        #   KEY=rootUser VAL='admin'
        # Then seal rootPassword the same way.
        existingSecret: rustfs-credentials
        # Optional: Enable the modern Next.js management console
        console:
          enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
