# NAMESPACE ISOLATION — NetworkPolicy
# Strategy: default-deny ingress per namespace, then allow-list explicitly.
# Egress is left open (all allowed) — restrict further per-workload if needed.
# Cilium implements the standard NetworkPolicy spec; these are portable.
#
# Ingress-nginx runs in kube-system. The namespaceSelector uses the auto-label
# kubernetes.io/metadata.name (added by k8s >= 1.21 to every namespace).
#
# CNPA/CNPE relevance: NetworkPolicy is a core exam topic. Understanding
# podSelector vs namespaceSelector AND/OR semantics is directly tested.


# app — user workloads

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow traffic from ingress-nginx controller (runs in kube-system)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress-nginx
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx

---
# Allow intra-namespace (pods in the same namespace talk freely)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}

---
# Allow all egress: DNS, internet, cross-namespace API calls
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - {}


