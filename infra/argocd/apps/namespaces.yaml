# -----------------------------------------------------------------------------
# PLATFORM WORKLOADS
# -----------------------------------------------------------------------------

# Primary app namespace — user-deployed workloads run here
# baseline enforce: blocks privileged pods and host mounts
# restricted warn: surfaces violations without hard-blocking during migration
apiVersion: v1
kind: Namespace
metadata:
  name: app
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.io/managed-by: argocd
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted

---
# Core platform backend — registry, DB operator, internal services
apiVersion: v1
kind: Namespace
metadata:
  name: platform-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.io/managed-by: argocd
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted


# -----------------------------------------------------------------------------
# OBSERVABILITY
# -----------------------------------------------------------------------------

---
# Loki, Fluent Bit, VictoriaMetrics, Grafana
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.io/managed-by: argocd
    pod-security.kubernetes.io/enforce: baseline

