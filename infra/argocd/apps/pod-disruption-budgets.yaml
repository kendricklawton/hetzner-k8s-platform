apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pod-disruption-budgets
  namespace: argocd
  labels:
    platform.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/k8s-platform.git  # run: task cluster:set-repo
    targetRevision: HEAD
    path: infra/manifests/pdbs
  destination:
    server: "https://kubernetes.default.svc"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
