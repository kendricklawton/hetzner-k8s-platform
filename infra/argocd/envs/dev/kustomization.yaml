apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../apps/alertmanager-config.yaml
  - ../../apps/cert-manager.yaml
  - ../../apps/cluster-issuer.yaml
  - ../../apps/cnpg-metrics.yaml
  - ../../apps/cnpg.yaml
  - ../../apps/etcd-backup.yaml
  - ../../apps/external-secrets.yaml
  - ../../apps/fluent-bit.yaml
  - ../../apps/sealed-secrets.yaml
  - ../../apps/grafana.yaml
  - ../../apps/ingress-nginx.yaml
  - ../../apps/kyverno.yaml
  - ../../apps/loki.yaml
  - ../../apps/namespaces.yaml
  - ../../apps/network-policies.yaml
  - ../../apps/opencost.yaml
  - ../../apps/pod-disruption-budgets.yaml
  - ../../apps/resource-policies.yaml
  - ../../apps/runtime-classes.yaml
  - ../../apps/rustfs.yaml
  - ../../apps/trivy-operator.yaml
  - ../../apps/victoria-metrics.yaml
  - ../../apps/vm-alert-rules.yaml

patches:
  - target:
      kind: Application
      name: ingress-nginx
    patch: |-
      - op: add
        path: /spec/source/helm/parameters/-
        value:
          name: controller.service.annotations.load-balancer\.hetzner\.cloud/name
          value: "dev-ash-lb-ingress"
