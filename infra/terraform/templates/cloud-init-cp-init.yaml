#cloud-config
hostname: __HOSTNAME__
manage_etc_hosts: true
ssh_deletekeys: true
ssh_genkeytypes: [rsa, ecdsa, ed25519]

write_files:
  - path: /etc/k8s-bootstrap.env
    permissions: "0600"
    content: |
      ROLE=cp-init
      HOSTNAME=__HOSTNAME__
      NODE_PRIVATE_IP=__NODE_PRIVATE_IP__
      NETWORK_GATEWAY=__NETWORK_GATEWAY__
      KUBERNETES_API_LB_IP=__KUBERNETES_API_LB_IP__
      KUBEADM_TOKEN=__KUBEADM_TOKEN__
      KUBEADM_CERT_KEY=__KUBEADM_CERT_KEY__
      TAILSCALE_AUTH_KEY=__TAILSCALE_AUTH_KEY__
      ENCRYPTION_KEY=__ENCRYPTION_KEY__
      GIT_REPO_URL=__GIT_REPO_URL__
      ARGOCD_APPS_PATH=__ARGOCD_APPS_PATH__
      CILIUM_VERSION=__CILIUM_VERSION__
      HCLOUD_MTU=__HCLOUD_MTU__
      CILIUM_MTU=__CILIUM_MTU__
      ARGOCD_VERSION=__ARGOCD_VERSION__
      HCLOUD_TOKEN_READONLY=__HCLOUD_TOKEN_READONLY__
      HCLOUD_NETWORK_NAME=__HCLOUD_NETWORK_NAME__
      CCM_VERSION=__CCM_VERSION__
      CSI_VERSION=__CSI_VERSION__
      SEALED_SECRETS_VERSION=__SEALED_SECRETS_VERSION__

runcmd:
  - /usr/local/bin/kubeadm-bootstrap.sh
