#cloud-config
hostname: ${hostname}
manage_etc_hosts: true
ssh_deletekeys: true
ssh_genkeytypes: [rsa, ecdsa, ed25519]

write_files:
  # Private network interface — DHCP but don't steal the default route
  - path: /etc/netplan/60-private-net.yaml
    permissions: "0600"
    content: |
      network:
        version: 2
        ethernets:
          private:
            match:
              name: "e*"
            dhcp4: true
            dhcp4-overrides:
              use-routes: false
            routes:
            - to: 10.0.0.1
              scope: link
            - to: 10.0.0.0/16
              via: 10.0.0.1

%{ if !is_primary ~}
  # NAT FAILOVER WATCHDOG — secondary only
  # Monitors primary NAT via ICMP. After 3 consecutive failures (30s),
  # uses Hetzner API to reroute 0.0.0.0/0 to this node.
  # Failover is one-directional — `terraform apply` restores the primary route.
  - path: /usr/local/bin/nat-failover.sh
    permissions: "0700"
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail

      PRIMARY_IP="${peer_nat_ip}"
      MY_IP=$(ip -4 addr show | grep "10\.0\.1\." | awk '{print $2}' | cut -d/ -f1 | head -1)
      NETWORK_ID="${hcloud_network_id}"
      TOKEN="${hcloud_token}"
      API="https://api.hetzner.cloud/v1"
      LOG="/var/log/nat-failover.log"

      FAIL_COUNT=0
      FAIL_THRESHOLD=3
      CHECK_INTERVAL=10
      IS_ACTIVE=false

      echo "[failover] Watchdog started at $(date) — monitoring primary at $PRIMARY_IP" >> $LOG

      while true; do
        if ping -c 1 -W 3 "$PRIMARY_IP" > /dev/null 2>&1; then
          FAIL_COUNT=0
        else
          FAIL_COUNT=$((FAIL_COUNT + 1))
          echo "[failover] Primary unreachable ($FAIL_COUNT/$FAIL_THRESHOLD) at $(date)" >> $LOG

          if [ "$FAIL_COUNT" -ge "$FAIL_THRESHOLD" ] && [ "$IS_ACTIVE" = false ]; then
            echo "[failover] TAKING OVER — switching route to $MY_IP at $(date)" >> $LOG

            # Delete the route pointing to the dead primary
            curl -sf -X POST "$API/networks/$NETWORK_ID/actions/delete_route" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"destination\":\"0.0.0.0/0\",\"gateway\":\"$PRIMARY_IP\"}" >> $LOG 2>&1 || true

            sleep 2

            # Add route pointing to this secondary
            curl -sf -X POST "$API/networks/$NETWORK_ID/actions/add_route" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"destination\":\"0.0.0.0/0\",\"gateway\":\"$MY_IP\"}" >> $LOG 2>&1

            IS_ACTIVE=true
            echo "[failover] Route switched to self at $(date)" >> $LOG
          fi
        fi
        sleep $CHECK_INTERVAL
      done

  - path: /etc/systemd/system/nat-failover.service
    permissions: "0644"
    content: |
      [Unit]
      Description=NAT Gateway Failover Watchdog
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/nat-failover.sh
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
%{ endif ~}

runcmd:
  # 1. Apply private network netplan
  - netplan generate
  - netplan apply
  - sleep 5

  # 2. Force IP Forwarding & Disable UFW (just in case)
  - sysctl -w net.ipv4.ip_forward=1
  - systemctl stop ufw || true
  - systemctl disable ufw || true

  # 3. Native IPTables Injection (Bulletproof)
  - |
    WAN_IFACE=$(ip route show default | awk '{print $5}' | head -n1)
    [ -z "$WAN_IFACE" ] && WAN_IFACE="eth0"
    echo "WAN interface: $WAN_IFACE" >> /var/log/nat-setup.log

    # Flush forward/postrouting to avoid duplicates, then hardcode the NAT rules
    iptables -F FORWARD
    iptables -t nat -F POSTROUTING
    iptables -A FORWARD -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
    iptables -A FORWARD -s 10.0.0.0/16 -j ACCEPT
    iptables -t nat -A POSTROUTING -o $WAN_IFACE -j MASQUERADE
    netfilter-persistent save
    if ! test -s /etc/iptables/rules.v4; then
      echo "[FATAL] iptables rules not persisted — NAT will break on reboot" >> /var/log/nat-setup.log
      exit 1
    fi
    echo "iptables rules persisted to /etc/iptables/rules.v4" >> /var/log/nat-setup.log

  # 4. Join Tailscale
  - |
    echo "Waiting for tailscaled socket..." >> /var/log/tailscale-join.log
    for i in $(seq 1 12); do
      [ -S /run/tailscale/tailscaled.sock ] && break
      sleep 5
    done
    echo "tailscaled socket ready, joining..." >> /var/log/tailscale-join.log
  - |
    NEXT_WAIT=0
    until tailscale up \
      --authkey=${tailscale_auth_nat_key} \
      --ssh \
      --hostname=${hostname} \
      --advertise-tags="tag:nat" \
      --reset >> /var/log/tailscale-join.log 2>&1 \
      || [ $NEXT_WAIT -eq 12 ]; do
      sleep 5
      NEXT_WAIT=$((NEXT_WAIT+1))
    done

%{ if !is_primary ~}
  # 5. Start failover watchdog (secondary NAT only)
  - systemctl daemon-reload
  - systemctl enable nat-failover.service
  - systemctl start nat-failover.service
%{ endif ~}
