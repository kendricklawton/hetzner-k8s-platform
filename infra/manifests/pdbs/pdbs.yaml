# Pod Disruption Budgets — prevents simultaneous pod evictions during node drains.
# maxUnavailable: 1 ensures at least n-1 replicas stay running during upgrades.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cnpg-operator
  namespace: cnpg-system
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fluent-bit
  namespace: observability
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit
---
