# PLACEHOLDER — replace with a SealedSecret after cluster bootstrap.
#
# Generate with:
#   task cluster:seal TENANT=observability NAME=grafana-admin-secret KEY=GF_SECURITY_ADMIN_PASSWORD VAL='<your-password>'
#
# Then replace this file with the output from tenants/observability/grafana-admin-secret-secret.yaml
#
# This plain Secret exists only so Grafana can start on first boot.
# It MUST be replaced with a SealedSecret before production use.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-secret
  namespace: observability
stringData:
  GF_SECURITY_ADMIN_PASSWORD: "changeme"
