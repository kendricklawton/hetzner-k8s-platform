# =============================================================================
# CNPG METRICS ABSENT — VMRule
# =============================================================================
# Fires when CNPG Postgres metrics disappear from scraping.
#
# NOTE: This alert requires a CNPG Cluster CR to exist in the cluster.
# Do NOT deploy until you have created a PostgreSQL cluster (e.g., in
# platform-system namespace). Without a running CNPG instance, this
# alert will fire continuously as a false positive.
#
# To deploy: uncomment the VMRule below and push to Git.
# =============================================================================

# apiVersion: operator.victoriametrics.com/v1beta1
# kind: VMRule
# metadata:
#   name: cnpg-absent-metrics
#   namespace: observability
# spec:
#   groups:
#     - name: cnpg
#       interval: 30s
#       rules:
#         - alert: CNPGMetricsAbsent
#           expr: absent(cnpg_pg_stat_activity_count)
#           for: 5m
#           labels:
#             severity: warning
#           annotations:
#             summary: "CNPG metrics have disappeared"
#             description: "cnpg_pg_stat_activity_count has been absent for >5m. The VMServiceScrape selector may no longer match CNPG pods, or CNPG is down."
