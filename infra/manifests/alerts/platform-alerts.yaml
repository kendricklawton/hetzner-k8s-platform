apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: platform-alerts
  namespace: observability
spec:
  groups:
    - name: node
      interval: 30s
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not Ready"
            description: "Node has been in a non-Ready state for >5m."

        - alert: NodeHighMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} has memory pressure"
            description: "Node has been under memory pressure for >5m."

        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} has disk pressure"
            description: "Node has been under disk pressure for >5m."

    - name: pod
      interval: 30s
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} has restarted >3 times in the last 10 minutes."

        - alert: PodNotReady
          expr: min_over_time(kube_pod_status_ready{condition="true"}[5m]) == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
            description: "Pod has been in a non-Ready state for >10m."

    - name: storage
      interval: 60s
      rules:
        - alert: PVCAlmostFull
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is >80% full"
            description: "Current usage: {{ $value | humanizePercentage }}."

        - alert: PVCCriticallyFull
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.95
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is >95% full"
            description: "Current usage: {{ $value | humanizePercentage }}. Immediate action required."

    - name: certificates
      interval: 60s
      rules:
        - alert: CertificateExpiringSoon
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 24 * 3600
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in <14 days"
            description: "Certificate will expire in {{ $value | humanizeDuration }}."

        - alert: CertificateExpiryCritical
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 3 * 24 * 3600
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in <3 days"
            description: "Certificate will expire in {{ $value | humanizeDuration }}. Renewal may have failed."

    - name: backups
      interval: 60s
      rules:
        - alert: EtcdBackupJobFailed
          expr: kube_job_status_failed{job_name=~"etcd-backup.*"} > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "etcd backup job failed"
            description: "Job {{ $labels.job_name }} in {{ $labels.namespace }} has failed. Check logs."

        - alert: EtcdBackupMissing
          expr: time() - kube_job_status_completion_time{job_name=~"etcd-backup.*"} > 48 * 3600
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "No successful etcd backup in >48 hours"
            description: "Last successful etcd backup was {{ $value | humanizeDuration }} ago."

    - name: watchdog
      interval: 30s
      rules:
        - alert: Watchdog
          expr: vector(1)
          labels:
            severity: none
          annotations:
            summary: "Alerting pipeline is functional"
            description: "This is a dead man's switch alert. If this stops firing, the alerting pipeline is broken."
